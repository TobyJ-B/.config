set -a terminal-features "tmux-256color:RGB"
set -g extended-keys on
set -g prefix C-Space
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=colour255, bg=default, bold"
set -g window-status-format "#[fg=colour240]#[default] #I:#W#{?window_flags,#{window_flags},} #[fg=colour240]#[default]"
set -g window-status-current-format "#[fg=colour252]#[default] #I:#W#{?window_flags,#{window_flags},} #[fg=colour252]#[default]"
set -g status-interval 5
set -g status-left "#S"
set -g status-right ""



bind r source-file "~/.config/tmux/tmux.conf"
bind b set -g status
bind x kill-window


bind p new-window "~/.config/scripts/open-pdf.sh"
bind g run-shell "~/.config/scripts/open-github.sh"
bind P run "~/.config/scripts/tmux-sessionizer.sh ~/Documents/Projects"
bind D run "~/.config/scripts/tmux-sessionizer.sh ~/.config/"

